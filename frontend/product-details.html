<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop - Product Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="logo">
                    <h1><i class="fas fa-shopping-bag"></i> <a href="index.html" style="color: inherit; text-decoration: none;">E-Shop</a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="cart-btn" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </button>
                    <button id="login-btn" class="login-btn">
                        <i class="fas fa-user"></i> Login
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="product-details">
            <div class="container">
                <div id="product-detail" class="product-detail">
                    <!-- Product details will be loaded here -->
                    <div class="loading">Loading product...</div>
                </div>
                <div class="related-products">
                    <h3>Related Products</h3>
                    <div id="related-products" class="products-grid">
                        <!-- Related products will be loaded here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 E-Shop. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="product-details.js"></script>
</body>
</html>
