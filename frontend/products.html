<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop - Products</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="logo">
                    <h1><i class="fas fa-shopping-bag"></i> <a href="index.html" style="color: inherit; text-decoration: none;">E-Shop</a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="cart-btn" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </button>
                    <button id="login-btn" class="login-btn">
                        <i class="fas fa-user"></i> Login
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="products">
            <div class="container">
                <h2>Our Products</h2>
                <div class="filters">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Computers">Computers</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                    <input type="text" id="search-input" placeholder="Search products...">
                    <button id="search-btn" class="btn-secondary">Search</button>
                </div>
                <div id="products-grid" class="products-grid">
                    <!-- Products will be loaded here -->
                </div>
                <div id="loading" class="loading">Loading products...</div>
                <div class="pagination">
                    <button id="prev-page" class="btn-secondary">Previous</button>
                    <span id="page-info">Page 1</span>
                    <button id="next-page" class="btn-secondary">Next</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 E-Shop. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="products.js"></script>
</body>
</html>
